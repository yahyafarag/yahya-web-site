    <!-- Preconnect to Google Fonts for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --card-border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }
        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1; overflow: hidden;
        }
        .particles span {
            position: absolute; display: block; border-radius: 50%;
            background: rgba(255,255,255,0.1);
            animation: float linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        
        nav {
            position: fixed; top: 0; width: 100%; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px); z-index: 1000; display: flex;
            justify-content: space-between; align-items: center; padding: 20px 5%;
            border-bottom: 1px solid var(--card-border);
        }
        .logo { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--text-main); text-decoration: none; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-size: 1rem; font-weight: 500; transition: color 0.3s ease; }
        .nav-links a:hover { color: var(--accent); }
        .lang-toggle { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; }
        .menu-toggle { display: none; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        
        @media(max-width: 768px) {
            .nav-links {
                position: absolute; top: 100%; left: 0; width: 100%;
                background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);
                flex-direction: column; text-align: center; padding: 20px 0;
                display: none; border-bottom: 1px solid var(--card-border);
            }
            .nav-links.active { display: flex; }
            .menu-toggle { display: block; }
        }

        .hero {
            padding: 150px 20px 80px; text-align: center; max-width: 900px; margin: 0 auto;
        }
        .profile-wrapper {
            position: relative; width: 180px; height: 180px; margin: 0 auto 30px;
            border-radius: 50%; padding: 5px; background: linear-gradient(45deg, var(--accent), #8b5cf6);
            box-shadow: 0 0 30px var(--accent-glow);
        }
        .profile-img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 4px solid var(--bg-dark);
        }
        .hero h1 { font-family: 'Outfit', sans-serif; font-size: 3.5rem; font-weight: 800; margin-bottom: 15px; }
        .hero p { font-size: 1.2rem; color: var(--text-muted); margin-bottom: 40px; line-height: 1.8; }
        
        .hero-btns { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 12px 30px; border-radius: 30px; font-weight: 600; text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: var(--accent); color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 6px 20px var(--accent-glow); }
        .btn-secondary {
            background: transparent; color: var(--text-main);
            border: 2px solid rgba(255,255,255,0.2);
        }
        .btn-secondary:hover { border-color: var(--accent); background: rgba(59, 130, 246, 0.1); }

        section { padding: 80px 20px; max-width: 1200px; margin: 0 auto; }
        .section-title {
            font-family: 'Outfit', sans-serif; font-size: 2.5rem; text-align: center;
            margin-bottom: 50px; color: var(--text-main);
        }

        .stats-section { background: rgba(0,0,0,0.2); padding: 60px 20px; border-top: 1px solid var(--card-border); border-bottom: 1px solid var(--card-border); }
        .stats-grid { display: flex; justify-content: space-around; flex-wrap: wrap; max-width: 1000px; margin: 0 auto; gap: 30px; }
        .stat-item { text-align: center; }
        .stat-number { font-size: 3.5rem; font-weight: 800; font-family: 'Outfit', sans-serif; color: var(--accent); line-height: 1; }
        .stat-label { font-size: 1.1rem; color: var(--text-muted); margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }

        .skills-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;
        }
        .skill-card {
            background: var(--bg-card); border: 1px solid var(--card-border);
            border-radius: 20px; padding: 30px; backdrop-filter: blur(10px);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .skill-card:hover {
            transform: translateY(-5px); border-color: var(--accent);
        }
        .skill-card h3 { font-size: 1.3rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .skill-card p { color: var(--text-muted); font-size: 0.95rem; }

        .contact-box {
            background: var(--bg-card); border: 1px solid var(--card-border);
            border-radius: 20px; padding: 50px; text-align: center; max-width: 800px; margin: 0 auto;
        }
        .contact-box h3 { font-size: 2rem; margin-bottom: 20px; font-family: 'Outfit', sans-serif; }

        footer {
            text-align: center; padding: 40px 20px; border-top: 1px solid var(--card-border);
            background: rgba(0,0,0,0.3); margin-top: 50px;
        }
        .footer-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .footer-links a { color: var(--text-main); font-size: 1.5rem; text-decoration: none; transition: transform 0.3s ease; }
        .footer-links a:hover { transform: scale(1.2); color: var(--accent); }

        /* Animations */
        .fade-in-section {
            opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            will-change: opacity, visibility;
        }
        .fade-in-section.is-visible { opacity: 1; transform: translateY(0); }
        
        .marquee-wrapper { overflow: hidden; white-space: nowrap; width: 100%; }
        .marquee-content { display: inline-block; animation: marquee 30s linear infinite; }
        .marquee-content img { height: 50px; margin: 0 40px; vertical-align: middle; filter: grayscale(100%) brightness(200%); opacity: 0.6; transition: 0.3s ease; }
        .marquee-content img:hover { filter: none; opacity: 1; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        
        .back-to-top {
            position: fixed; bottom: 30px; right: 30px; background: var(--accent); color: white;
            width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 1.5rem;
            cursor: pointer; opacity: 0; pointer-events: none; transition: 0.3s ease; z-index: 999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
        }
        .back-to-top.visible { opacity: 1; pointer-events: auto; }
        .back-to-top:hover { background: #2563eb; transform: translateY(-3px); }

        /* Certificate Timeline Styles */
        .timeline {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px;
        }
        .card {
            background: var(--bg-card); border: 1px solid var(--card-border); border-radius: 20px;
            overflow: hidden; backdrop-filter: blur(10px); transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex; flex-direction: column; height: 100%;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.2); }
        .card-content { padding: 25px; flex-grow: 1; }
        .date-badge {
            display: inline-block; background: rgba(255,255,255,0.1); padding: 5px 12px;
            border-radius: 20px; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px;
        }
        .title { font-size: 1.25rem; margin-bottom: 10px; font-weight: 600; line-height: 1.4; }
        .provider { display: flex; align-items: center; gap: 10px; color: var(--text-muted); font-size: 0.95rem; margin-bottom: 20px; }
        .provider-icon { width: 24px; height: 24px; border-radius: 4px; }
        .details { display: flex; gap: 15px; margin-top: auto; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; color: #cbd5e1; }
        .cert-preview {
            height: 200px; width: 100%; overflow: hidden; position: relative;
            border-bottom: 1px solid var(--card-border); background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
        }
        .cert-image { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; cursor: pointer; }
        .card:hover .cert-image { transform: scale(1.05); }
        
        .css-certificate { width: 100%; height: 100%; background: linear-gradient(135deg, #1e293b, #0f172a); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: 4px solid rgba(255,255,255,0.05); padding: 20px; text-align: center; }
        .css-cert-logo { width: 60px; height: 60px; margin-bottom: 15px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }
        .css-cert-ribbon { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 800; color: #f8fafc; letter-spacing: 2px; }
        .css-cert-subtitle { font-size: 0.8rem; color: #94a3b8; margin-top: 5px; text-transform: uppercase; }

        .filter-bar { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 40px; }
        .filter-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); color: var(--text-main);
            padding: 8px 20px; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; font-family: 'Inter', sans-serif;
        }
        .filter-btn:hover, .filter-btn.active { background: var(--accent); border-color: var(--accent); }

        /* Modal Styles */
        .modal {
            display: none; position: fixed; z-index: 2000; padding-top: 50px; left: 0; top: 0;
            width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.9);
            justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .modal-content {
            margin: auto; display: block; max-width: 90%; max-height: 90vh; border-radius: 10px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); animation: zoom 0.3s ease;
        }
        @keyframes zoom { from {transform:scale(0.9); opacity:0;} to {transform:scale(1); opacity:1;} }
        .close-btn {
            position: absolute; top: 20px; right: 35px; color: #f1f1f1; font-size: 40px;
            font-weight: bold; transition: 0.3s; cursor: pointer; z-index: 2001;
        }
        .close-btn:hover, .close-btn:focus { color: var(--accent); text-decoration: none; cursor: pointer; }
        .timeline-item { content-visibility: auto; contain-intrinsic-size: 0 200px; }
    </style>
</head>
<body>
    <!-- Particle Background -->
    <div class="particles" id="particles"></div>

    <nav>
        <a href="index.html" class="logo">Y. Farag</a>
        <button class="menu-toggle" id="mobile-menu-btn">☰</button>
        <div class="nav-links" id="nav-links">
            <a href="index.html">الرئيسية</a>
            <a href="index.html#experience">الخبرة</a>
            <a href="certificates.html" class="lang-toggle">🌐 English</a>
        </div>
    </nav>
    
    <header class="hero" style="padding-top: 120px; padding-bottom: 40px;">
        <h1>خزانة شهاداتي</h1>
        <p>تسلسل زمني موثق لأكثر من {num_certs} شهادة مهنية من مؤسسات عالمية.</p>
    </header>

    <section id="certificates" class="fade-in-section" style="padding-top: 20px;">
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">الكل</button>
            <button class="filter-btn" data-filter="project-management">إدارة المشاريع</button>
            <button class="filter-btn" data-filter="operational-excellence">التميز التشغيلي</button>
            <button class="filter-btn" data-filter="industrial-automation">الأتمتة الصناعية</button>
            <button class="filter-btn" data-filter="electrical-systems">الكهرباء</button>
            <button class="filter-btn" data-filter="professional-development">التطوير المهني</button>
        </div>
        <div class="timeline">
            {cards_html}
        </div>
    </section>

    <footer>
        <div class="footer-links">
            <a href="https://linkedin.com/in/yahya-tarek" target="_blank" title="LinkedIn" aria-label="حساب لينكد إن">💼</a>
            <a href="https://wa.me/201099246336" target="_blank" title="WhatsApp" aria-label="محادثة واتساب">💬</a>
            <a href="mailto:y_tarek91@yahoo.com" title="Email" aria-label="إرسال بريد إلكتروني">📧</a>
            <a href="CV.html" target="_blank" title="Download CV" aria-label="تنزيل السيرة الذاتية">📄</a>
        </div>
        <p>&copy; 2026 Yahya Tarek Farag. صُنع بشغف ودقة.</p>
    </footer>

    <!-- Back to Top -->
    <button class="back-to-top" id="backToTop" title="العودة للأعلى" aria-label="العودة للأعلى">↑</button>

    <!-- The Modal -->
    <div id="imageModal" class="modal" onclick="closeModal()" aria-modal="true" role="dialog">
        <span class="close-btn" role="button" aria-label="إغلاق النافذة">&times;</span>
        <img class="modal-content" id="img01" alt="Certificate Full View" onclick="event.stopPropagation()">
    </div>

    <script>
        function openModal(src) {
            var modal = document.getElementById("imageModal");
            var modalImg = document.getElementById("img01");
            modal.style.display = "flex";
            modalImg.src = src;
            document.body.style.overflow = "hidden";
        }

        function closeModal() {
            var modal = document.getElementById("imageModal");
            modal.style.display = "none";
            document.body.style.overflow = "auto";
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                closeModal();
            }
        });

        // Mobile menu toggle
        const menuBtn = document.getElementById('mobile-menu-btn');
        const navLinks = document.getElementById('nav-links');
        
        menuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            menuBtn.textContent = navLinks.classList.contains('active') ? '✕' : '☰';
        });

        // Close mobile menu on link click
        navLinks.querySelectorالكل('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
                menuBtn.textContent = '☰';
            });
        });

        // Intersection Observer for scroll animations
        document.addEventListener("DOMContentLoaded", function() {
            // Dynamic About Me
            const aboutTexts = [
                "I am a passionate <strong>Industrial Automation Specialist</strong> with extensive experience in PLC programming, SCADA systems, and embedded machine learning. I thrive on optimizing manufacturing processes, integrating smart sensors, and upgrading legacy control systems to modern Industry 4.0 standards.",
                "As a certified <strong>Agile Project Manager</strong>, I excel at bridging the gap between technical engineering teams and business stakeholders. Armed with التميز التشغيلي methodologies and Scrum frameworks, I lead cross-functional teams to deliver complex projects on time, within budget, and with zero defects.",
                "With a strong foundation in <strong>الكهرباء Power Distribution</strong>, I specialize in designing and maintaining robust electrical systems. My expertise covers everything from MCC panel design to power generation, ensuring maximum reliability and safety in heavy industrial environments."
            ];
            let aboutIndex = 0;
            const aboutEl = document.getElementById('dynamic-about');
            if (aboutEl) {
                setInterval(() => {
                    aboutEl.style.opacity = 0;
                    setTimeout(() => {
                        aboutIndex = (aboutIndex + 1) % aboutTexts.length;
                        aboutEl.innerHTML = aboutTexts[aboutIndex];
                        aboutEl.style.opacity = 1;
                    }, 500);
                }, 8000);
            }
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                    }
                });
            }, { rootMargin: "0px" });

            document.querySelectorالكل('.fade-in-section').forEach((section) => {
                observer.observe(section);
            });

            // Stats Counter Animation
            const counterObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const counters = entry.target.querySelectorالكل('.stat-number');
                        counters.forEach(counter => {
                            const target = +counter.getAttribute('data-target');
                            const duration = 2000;
                            const step = target / (duration / 16);
                            let current = 0;
                            const timer = setInterval(() => {
                                current += step;
                                if (current >= target) {
                                    counter.textContent = target + '+';
                                    clearInterval(timer);
                                } else {
                                    counter.textContent = Math.floor(current) + '+';
                                }
                            }, 16);
                        });
                        counterObserver.unobserve(entry.target);
                    }
                });
            }, { rootMargin: "0px" });
            document.querySelectorالكل('.stats-section').forEach(s => counterObserver.observe(s));
        });

        // Particle Generator
        (function() {
            const container = document.getElementById('particles');
            if(container) {
                for (let i = 0; i < 40; i++) {
                    const span = document.createElement('span');
                    span.style.left = Math.random() * 100 + '%';
                    span.style.top = Math.random() * 100 + '%';
                    span.style.width = (Math.random() * 3 + 1) + 'px';
                    span.style.height = span.style.width;
                    span.style.animationDuration = (Math.random() * 15 + 10) + 's';
                    span.style.animationDelay = (Math.random() * 10) + 's';
                    container.appendChild(span);
                }
            }
        })();

        // Certificate Filter
        document.querySelectorالكل('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorالكل('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.getAttribute('data-filter');
                document.querySelectorالكل('.timeline-item').forEach(item => {
                    if (filter === 'all' || item.getAttribute('data-category') === filter) {
                        item.style.display = '';
                        item.style.opacity = '1';
                        item.style.transform = 'translateX(0)';
                    } else {
                        item.style.opacity = '0';
                        item.style.transform = 'translateX(-20px)';
                        setTimeout(() => { item.style.display = 'none'; }, 300);
                    }
                });
            });
        });

        // Back to Top
        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 500) {
                backToTop.classList.add('visible');
            } else {
                backToTop.classList.remove('visible');
            }
        });
        if(backToTop) {
            backToTop.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }
    </script>
</body>
</html>
