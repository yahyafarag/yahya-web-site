<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV - Yahya Tarek Farag</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #09101f 0%, #0c2446 100%);
            --accent: #00f2fe;
            --text-main: #f8fafc;
        }
        body {
            margin: 0; padding: 0;
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: 'Inter', 'Tajawal', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
        }
        header h1 { margin: 0; font-size: 1.5rem; }
        .header-actions { display: flex; gap: 1rem; }
        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .btn-back { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
        .btn-back:hover { background: rgba(255,255,255,0.2); }
        .btn-dl { background: var(--accent); }
        .btn-dl:hover { opacity: 0.9; }
        
        .pdf-container {
            flex: 1;
            width: 100%;
            background: #e2e8f0;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>Yahya Tarek Farag - General Manager of Engineering</h1>
        <div class="header-actions">
            <a href="index.html" class="btn btn-back"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
            <a href="https://raw.githubusercontent.com/yahyafarag/my-certificates/main/resume/Yahya_Tarek_Farag_CV_ATS.pdf" target="_blank" class="btn btn-dl"><i class="fa-solid fa-download"></i> Direct Download</a>
        </div>
    </header>
    <div class="pdf-container">
        <iframe src="https://raw.githubusercontent.com/yahyafarag/my-certificates/main/resume/Yahya_Tarek_Farag_CV_ATS.pdf" type="application/pdf"></iframe>
    </div>
</body>
</html>
