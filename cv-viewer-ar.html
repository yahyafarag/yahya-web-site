    <script>
        // Scroll Progress Bar
        window.addEventListener('scroll', () => {
            const scrollPx = document.documentElement.scrollTop;
            const winHeightPx = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (scrollPx / winHeightPx) * 100;
            const progressBar = document.getElementById('scroll-progress');
            if(progressBar) {
                progressBar.style.width = scrolled + '%';
            }
        });

        // Number Counter Animation
        const counters = document.querySelectorAll('.stat-number');
        const speed = 200; // The lower the slower

        const animateCounters = () => {
            counters.forEach(counter => {
                const text = counter.innerText;
                const target = +text.replace(/[^0-9]/g, '');
                if (target === 0) return;
                
                const suffix = text.replace(/[0-9]/g, '');
                counter.innerText = '0' + suffix;
                
                const updateCount = () => {
                    const count = +counter.innerText.replace(/[^0-9]/g, '');
                    const inc = target / speed;
                    
                    if(count < target) {
                        counter.innerText = Math.ceil(count + inc) + suffix;
                        setTimeout(updateCount, 15);
                    } else {
                        counter.innerText = text;
                    }
                };
                
                // Intersection Observer to trigger when visible
                const observer = new IntersectionObserver((entries) => {
                    if(entries[0].isIntersecting) {
                        updateCount();
                        observer.disconnect();
                    }
                }, { threshold: 0.5 });
                
                observer.observe(counter);
            });
        };
        
        document.addEventListener('DOMContentLoaded', animateCounters);
    </script>

    <style>
        .search-modal { display: none; position: fixed; z-index: 999999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(15,36,64,0.9); backdrop-filter: blur(5px); }
        .search-modal-content { background-color: var(--bg-color); margin: 10% auto; padding: 30px; border: 1px solid var(--accent); border-radius: 12px; width: 80%; max-width: 600px; position: relative; }
        .close-search { color: var(--accent); float: right; font-size: 28px; font-weight: bold; cursor: pointer; position: absolute; right: 20px; top: 15px; }
        #searchInput { width: 100%; padding: 15px; font-size: 1.2rem; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-color); margin-top: 20px; margin-bottom: 20px; outline: none; }
        #searchInput:focus { border-color: var(--accent); }
        .search-results a { display: block; padding: 10px; color: var(--text-color); text-decoration: none; border-bottom: 1px solid var(--glass-border); transition: 0.3s; }
        .search-results a:hover { background: rgba(242,140,40,0.1); color: var(--accent); }
    </style>
    
    <script>
        // Simple Static Search Index
        const searchIndex = [
            { title: "CMMS Implementation Case Study", url: "case-study-beverage.html", keywords: "cmms maintenance beverage food factory" },
            { title: "Greenfield Plant Commissioning", url: "article-greenfield.html", keywords: "greenfield plant commissioning setup" },
            { title: "IT/OT Convergence", url: "article-it-ot.html", keywords: "it ot convergence automation scada" },
            { title: "OEE Improvement", url: "article-oee.html", keywords: "oee overall equipment effectiveness performance" },
            { title: "Maintenance Cost Reduction", url: "case-study-cost.html", keywords: "cost reduction maintenance saving" },
            { title: "Projects Portfolio", url: "projects.html", keywords: "projects portfolio work" },
            { title: "Certificates", url: "certificates.html", keywords: "certificates education lean six sigma" }
        ];
        
        document.addEventListener('DOMContentLoaded', () => {
            const searchBtns = document.querySelectorAll('.search-btn-trigger');
            const modal = document.getElementById('searchModal');
            const closeBtn = document.querySelector('.close-search');
            const input = document.getElementById('searchInput');
            const results = document.getElementById('searchResults');
            
            searchBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    modal.style.display = 'block';
                    input.focus();
                });
            });
            
            closeBtn.onclick = () => { modal.style.display = 'none'; }
            window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; }
            
            input.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                results.innerHTML = '';
                if(query.length < 2) return;
                
                const matches = searchIndex.filter(item => 
                    item.title.toLowerCase().includes(query) || item.keywords.includes(query)
                );
                
                if(matches.length > 0) {
                    matches.forEach(match => {
                        const a = document.createElement('a');
                        a.href = match.url;
                        a.innerText = match.title;
                        results.appendChild(a);
                    });
                } else {
                    results.innerHTML = '<p style="color:var(--text-muted); padding:10px;">لم يتم العثور على نتائج.</p>';
                }
            });
        });
    </script>
