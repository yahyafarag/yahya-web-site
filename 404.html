<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Yahya Tarek Farag</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="scroll-progress"></div>
    <div id="particles-js"></div>
    
    <div class="container">
        <h1>404</h1>
        <p>Oops! The page you're looking for doesn't exist or has been moved.</p>
        <a href="index.html" class="btn">
            <i class="fas fa-home"></i> Return to Homepage
        </a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof particlesJS !== 'undefined') {
                particlesJS('particles-js', {
                    particles: {
                        number: { value: 60, density: { enable: true, value_area: 800 } },
                        color: { value: "#00f2fe" },
                        shape: { type: "circle" },
                        opacity: { value: 0.3, random: true },
                        size: { value: 3, random: true },
                        line_linked: { enable: true, distance: 150, color: "#00f2fe", opacity: 0.2, width: 1 },
                        move: { enable: true, speed: 1.5, direction: "none", random: true, straight: false, out_mode: "out", bounce: false }
                    },
                    interactivity: {
                        detect_on: "canvas",
                        events: { onhover: { enable: true, mode: "grab" }, onclick: { enable: true, mode: "push" }, resize: true },
                        modes: { grab: { distance: 140, line_linked: { opacity: 0.5 } }, push: { particles_nb: 3 } }
                    },
                    retina_detect: true
                });
            }
        });
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mobileBtn = document.querySelector('.mobile-menu-btn');
            const navLinks = document.querySelector('.nav-links');
            if(mobileBtn && navLinks) {
                mobileBtn.addEventListener('click', () => {
                    navLinks.classList.toggle('active');
                });
            }
            
            // Sticky Navbar transparency effect
            const navbar = document.querySelector('.navbar');
            window.addEventListener('scroll', () => {
                if(window.scrollY > 50) {
                    navbar.style.background = 'rgba(15, 36, 64, 0.85)';
                } else {
                    navbar.style.background = 'rgba(15, 36, 64, 1)';
                }
            });
        });
    </script>


    <a href="https://wa.me/201000000000" class="whatsapp-widget" target="_blank" aria-label="WhatsApp">
        <i class="fa-brands fa-whatsapp"></i>
        <span class="whatsapp-tooltip">Chat with me</span>
    </a>
        

    <script>
        // Scroll Progress Bar
        window.addEventListener('scroll', () => {
            const scrollPx = document.documentElement.scrollTop;
            const winHeightPx = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (scrollPx / winHeightPx) * 100;
            const progressBar = document.getElementById('scroll-progress');
            if(progressBar) {
                progressBar.style.width = scrolled + '%';
            }
        });

        // Number Counter Animation
        const counters = document.querySelectorAll('.stat-number');
        const speed = 200; // The lower the slower

        const animateCounters = () => {
            counters.forEach(counter => {
                const text = counter.innerText;
                const target = +text.replace(/[^0-9]/g, '');
                if (target === 0) return;
                
                const suffix = text.replace(/[0-9]/g, '');
                counter.innerText = '0' + suffix;
                
                const updateCount = () => {
                    const count = +counter.innerText.replace(/[^0-9]/g, '');
                    const inc = target / speed;
                    
                    if(count < target) {
                        counter.innerText = Math.ceil(count + inc) + suffix;
                        setTimeout(updateCount, 15);
                    } else {
                        counter.innerText = text;
                    }
                };
                
                // Intersection Observer to trigger when visible
                const observer = new IntersectionObserver((entries) => {
                    if(entries[0].isIntersecting) {
                        updateCount();
                        observer.disconnect();
                    }
                }, { threshold: 0.5 });
                
                observer.observe(counter);
            });
        };
        
        document.addEventListener('DOMContentLoaded', animateCounters);
    </script>
    
</body>
</html>
