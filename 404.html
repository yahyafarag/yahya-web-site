<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Yahya Tarek Farag</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
    body { font-family: 'Inter', 'Tajawal', sans-serif; }
    
    :root {
        --bg-gradient: linear-gradient(135deg, #09101f 0%, #0c2446 100%);
        --accent: #00f2fe;
        --accent-glow: rgba(0, 242, 254, 0.6);
        --text-main: #f8fafc;
        --text-muted: #cbd5e1;
    }
    
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        background: #0f172a;
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        text-align: center;
    }
    
    #particles-js {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 0;
        background: var(--bg-gradient);
    }
    
    .container {
        z-index: 1;
        position: relative;
        padding: 2rem;
        background: rgba(15, 23, 42, 0.75);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(0, 242, 254, 0.2);
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        max-width: 600px;
        width: 90%;
    }
    
    h1 {
        font-size: 6rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
        background: linear-gradient(to right, var(--accent), #fff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    
    p {
        font-size: 1.2rem;
        color: var(--text-muted);
        margin-bottom: 2rem;
    }
    
    .btn {
        padding: 0.85rem 1.5rem;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--accent);
        color: #0f172a;
        box-shadow: 0 4px 15px var(--accent-glow);
    }
    
    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px var(--accent-glow);
    }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    
    <div class="container">
        <h1>404</h1>
        <p>Oops! The page you're looking for doesn't exist or has been moved.</p>
        <a href="index.html" class="btn">
            <i class="fas fa-home"></i> Return to Homepage
        </a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof particlesJS !== 'undefined') {
                particlesJS('particles-js', {
                    particles: {
                        number: { value: 60, density: { enable: true, value_area: 800 } },
                        color: { value: "#00f2fe" },
                        shape: { type: "circle" },
                        opacity: { value: 0.3, random: true },
                        size: { value: 3, random: true },
                        line_linked: { enable: true, distance: 150, color: "#00f2fe", opacity: 0.2, width: 1 },
                        move: { enable: true, speed: 1.5, direction: "none", random: true, straight: false, out_mode: "out", bounce: false }
                    },
                    interactivity: {
                        detect_on: "canvas",
                        events: { onhover: { enable: true, mode: "grab" }, onclick: { enable: true, mode: "push" }, resize: true },
                        modes: { grab: { distance: 140, line_linked: { opacity: 0.5 } }, push: { particles_nb: 3 } }
                    },
                    retina_detect: true
                });
            }
        });
    </script>
</body>
</html>
